<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Kapı">
<title>Kapı</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: white; border-radius: 24px; padding: 3rem 2.5rem; text-align: center; box-shadow: 0 2px 20px rgba(0,0,0,0.08); max-width: 320px; width: 90%; }
  .icon { font-size: 64px; margin-bottom: 1.5rem; }
  h1 { font-size: 22px; font-weight: 600; color: #111; margin-bottom: 2rem; }
  .pin-dots { display: flex; justify-content: center; gap: 12px; margin-bottom: 1.5rem; }
  .dot { width: 16px; height: 16px; border-radius: 50%; background: #e5e5e5; transition: background 0.2s; }
  .dot.filled { background: #111; }
  .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1rem; }
  .num { padding: 1rem; font-size: 20px; font-weight: 500; border: none; border-radius: 14px; background: #f5f5f5; color: #111; cursor: pointer; transition: background 0.15s, transform 0.1s; }
  .num:active { background: #e0e0e0; transform: scale(0.95); }
  .num.del { font-size: 16px; }
  #shake { animation: shake 0.4s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
  button.main-btn { width: 100%; padding: 1rem; font-size: 18px; font-weight: 600; border: none; border-radius: 14px; background: #111; color: white; cursor: pointer; transition: opacity 0.2s, transform 0.1s; }
  button.main-btn:active { transform: scale(0.97); opacity: 0.8; }
  button.success { background: #16a34a; }
  button.error { background: #dc2626; }
  #status { margin-top: 1rem; font-size: 14px; color: #888; min-height: 20px; }
  #door-screen { display: none; }
</style>
</head>
<body>
<div class="card">
  <div id="pin-screen">
    <div class="icon">🔒</div>
    <h1>PIN Gir</h1>
    <div class="pin-dots" id="dots">
      <div class="dot" id="d0"></div>
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div>
    </div>
    <div class="numpad">
      <button class="num" onclick="press('1')">1</button>
      <button class="num" onclick="press('2')">2</button>
      <button class="num" onclick="press('3')">3</button>
      <button class="num" onclick="press('4')">4</button>
      <button class="num" onclick="press('5')">5</button>
      <button class="num" onclick="press('6')">6</button>
      <button class="num" onclick="press('7')">7</button>
      <button class="num" onclick="press('8')">8</button>
      <button class="num" onclick="press('9')">9</button>
      <button class="num" onclick="press('')"></button>
      <button class="num" onclick="press('0')">0</button>
      <button class="num del" onclick="del()">⌫</button>
    </div>
  </div>
  <div id="door-screen">
    <div class="icon">🚪</div>
    <h1>Kapı Kontrolü</h1>
    <button class="main-btn" id="btn" onclick="triggerDoor()">Kapıyı Aç</button>
    <p id="status"></p>
  </div>
</div>
<script>
  const PIN = '4842';
  let entered = '';

  function press(n) {
    if (!n || entered.length >= 4) return;
    entered += n;
    updateDots();
    if (entered.length === 4) checkPin();
  }

  function del() {
    entered = entered.slice(0, -1);
    updateDots();
  }

  function updateDots() {
    for (let i = 0; i < 4; i++) {
      document.getElementById('d' + i).className = 'dot' + (i < entered.length ? ' filled' : '');
    }
  }

  function checkPin() {
    if (entered === PIN) {
      document.getElementById('pin-screen').style.display = 'none';
      document.getElementById('door-screen').style.display = 'block';
    } else {
      const dots = document.getElementById('dots');
      dots.id = 'shake';
      setTimeout(() => { dots.id = 'dots'; }, 400);
      entered = '';
      updateDots();
    }
  }

  async function triggerDoor() {
    const btn = document.getElementById('btn');
    const status = document.getElementById('status');
    btn.textContent = 'Gönderiliyor...';
    btn.className = 'main-btn';
    status.textContent = '';
    try {
      await fetch('https://as-apia.coolkit.cc/v2/smartscene2/webhooks/execute?id=6fd9c1e241964788865e1f4eb0807f48', { mode: 'no-cors' });
      btn.textContent = '✓ Komut Gönderildi';
      btn.className = 'main-btn success';
      status.textContent = 'Kapı komutu iletildi.';
    } catch(e) {
      btn.textContent = 'Hata!';
      btn.className = 'main-btn error';
      status.textContent = 'Bağlantı hatası.';
    }
    setTimeout(() => {
      btn.textContent = 'Kapıyı Aç';
      btn.className = 'main-btn';
      status.textContent = '';
    }, 3000);
  }
</script>
</body>
</html>
